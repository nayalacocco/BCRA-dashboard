name: BCRA Data Revalidation

# Revalida los datos del BCRA a lo largo del día:
#
# Horario ART → UTC
# ─────────────────────────────────────────────────────────────────────────────
#  16:00 ART (19:00 UTC) — Cierre MAE                       [L-V]
#  17:00 ART (20:00 UTC) — Cierre mercado                   [L-V]
#  18:00 ART (21:00 UTC) — Post-cierre / cuadro BCRA en X   [L-V]
#  20:30 ART (23:30 UTC) — Segunda verificación             [todos los días]
#  01:00 ART (04:00 UTC) — Verificación nocturna            [todos los días]
#
# Smart check: el endpoint consulta la API BCRA antes de invalidar.
# Si el dato no cambió, responde { skipped: true } y no regenera.
#
# Variables requeridas en GitHub Secrets:
#   VERCEL_APP_URL         — ej: https://argentina-dashboard.vercel.app
#   CRON_SECRET            — mismo valor que en .env.local / Vercel env
#   VERCEL_BYPASS_SECRET   — opcional, para bypasear Vercel Auth si está activo

on:
  schedule:
    # ── Días hábiles (L-V) ────────────────────────────────────────────────
    # 16:00 ART = 19:00 UTC — Cierre MAE
    - cron: "0 19 * * 1-5"
    # 17:00 ART = 20:00 UTC — Cierre mercado
    - cron: "0 20 * * 1-5"
    # 18:00 ART = 21:00 UTC — Post-cierre / cuadro oficial BCRA en X
    - cron: "0 21 * * 1-5"

    # ── Todos los días ────────────────────────────────────────────────────
    # 20:30 ART = 23:30 UTC — Segunda verificación
    - cron: "30 23 * * *"
    # 01:00 ART = 04:00 UTC — Verificación nocturna
    - cron: "0 4 * * *"

  # Ejecución manual desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      reason:
        description: "Razón de la revalidación manual"
        required: false
        default: "Manual trigger"

jobs:
  revalidate:
    name: Revalidar caché BCRA
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Revalidar datos del BCRA
        run: |
          echo "🔄 Iniciando revalidación de caché BCRA..."
          echo "⏰ UTC:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🕐 ART:  $(TZ='America/Argentina/Buenos_Aires' date '+%Y-%m-%d %H:%M:%S ART')"
          echo "🌐 URL:  ${{ secrets.VERCEL_APP_URL }}/api/cron/revalidate"

          HTTP_RESPONSE=$(curl -s \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}" \
            -H "Accept: application/json" \
            --max-time 30 \
            --write-out "HTTPSTATUS:%{http_code}" \
            "${{ secrets.VERCEL_APP_URL }}/api/cron/revalidate")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed -E 's/HTTPSTATUS:[0-9]+$//')
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tr -d '\n' | sed -E 's/.*HTTPSTATUS:([0-9]+)$/\1/')

          echo "📦 HTTP Status: $HTTP_CODE"
          echo "📦 Respuesta:   $HTTP_BODY"

          # Mostrar si se revalidó o se saltó (smart check)
          SKIPPED=$(echo "$HTTP_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('skipped', False))" 2>/dev/null || echo "unknown")
          BCRA_DATE=$(echo "$HTTP_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('bcraLatestDate', '?'))" 2>/dev/null || echo "?")

          if [ "$SKIPPED" = "True" ]; then
            echo "⏭️  Revalidación omitida — dato BCRA sin cambios (último: $BCRA_DATE)"
          else
            echo "✅ Revalidación ejecutada — dato BCRA más reciente: $BCRA_DATE"
          fi

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Endpoint respondió correctamente"
          else
            echo "❌ Error en el endpoint (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Resumen
        if: always()
        run: |
          echo "🏦 Argentina Dashboard — Revalidación completada"
          echo "📅 $(TZ='America/Argentina/Buenos_Aires' date '+%d/%m/%Y %H:%M') ART"
